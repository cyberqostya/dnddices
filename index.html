<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>DnD dices</title>
  <link rel="icon" href="./images/favicon.png" type="image/png" />
  <link rel="stylesheet" href="./index.css" />

  <script>
    // turnoff when local dev
    // Application -> Service Workers -> Update on reload
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", async () => {
        try {
          await navigator.serviceWorker.register("./service-worker.js");
          console.log("Service Worker registered");
        } catch (error) {
          console.error("Service Worker registration failed:", error);
        }
      });
    }
  </script>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>
  <main class="main">
    <div class="buttons-container _top">
      <button class="button _settings _reroll">REROLL</button>
      <button class="button _settings _edit">EDIT</button>
      <button class="button _settings _karma">KARMA</button>
      <a class="button _coin" href="https://pay.cloudtips.ru/p/656a5ae1" target="_blank">
        <img src="./images/coin.png" />
      </a>
    </div>

    <div class="total">
      <span class="total__text"></span>
      <span class="total__placeholder _active">{sum}</span>
    </div>

    <div class="dices _empty" role="button"></div>

    <footer class="footer">
      <div role="button" class="dice-tower _empty">
        <button class="cross _light"></button>
        <p class="dice-tower__text"></p>
        <button class="cross _light"></button>
      </div>

      <div class="buttons-container">
        <button class="button _dice">d2</button>
        <button class="button _dice">d4</button>
        <button class="button _dice">d6</button>
        <button class="button _dice">d8</button>
        <button class="button _dice">d10</button>
        <button class="button _dice">d12</button>
        <button class="button _dice">d20</button>
        <button class="button _dice">d100</button>
        <!-- <div>|</div> -->
      </div>
    </footer>
  </main>

  <div class="ban-interface"></div>

  <script src="./index.js" type="module"></script>
</body>

</html>
